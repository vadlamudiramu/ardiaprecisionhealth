<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1e2f4a"/>
      <stop offset="100%" stop-color="#0d3340"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Rounded square bg -->
  <rect width="64" height="64" rx="13" fill="url(#bg)"/>

  <!-- Quantum orbit rings -->
  <ellipse cx="32" cy="32" rx="18" ry="6" stroke="#14b8a6" stroke-width="1.2" fill="none" opacity="0.65"/>
  <ellipse cx="32" cy="32" rx="18" ry="6" stroke="#0ea5e9" stroke-width="1.2" fill="none" opacity="0.55"
    transform="rotate(60 32 32)"/>
  <ellipse cx="32" cy="32" rx="18" ry="6" stroke="#5eead4" stroke-width="1.2" fill="none" opacity="0.55"
    transform="rotate(120 32 32)"/>

  <!-- Orbit nodes -->
  <circle cx="50" cy="32" r="2.5" fill="#14b8a6" filter="url(#glow)"/>
  <circle cx="14" cy="32" r="2.5" fill="#14b8a6" filter="url(#glow)"/>
  <circle cx="32" cy="50" r="2.5" fill="#0ea5e9" filter="url(#glow)"/>
  <circle cx="32" cy="14" r="2.5" fill="#0ea5e9" filter="url(#glow)"/>
  <circle cx="41" cy="22" r="2"   fill="#f59e0b" filter="url(#glow)"/>
  <circle cx="23" cy="42" r="2"   fill="#f59e0b" filter="url(#glow)"/>

  <!-- DNA cross strands -->
  <path d="M32 18 Q35 22 32 26 Q29 30 32 34 Q35 38 32 42 Q29 46 32 50"
        stroke="#5eead4" stroke-width="1.8" fill="none" stroke-linecap="round" opacity="0.85"/>
  <path d="M18 32 Q22 29 26 32 Q30 35 34 32 Q38 29 42 32 Q46 35 50 32"
        stroke="#14b8a6" stroke-width="1.8" fill="none" stroke-linecap="round" opacity="0.85"/>

  <!-- Upward arrow -->
  <path d="M44 22 L48 16 L52 22" stroke="#f59e0b" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="48" y1="16" x2="48" y2="28" stroke="#f59e0b" stroke-width="2" stroke-linecap="round"/>

  <!-- Center nucleus -->
  <circle cx="32" cy="32" r="4" fill="#fff" opacity="0.12"/>
  <circle cx="32" cy="32" r="2.5" fill="#14b8a6"/>
  <circle cx="32" cy="32" r="1.2" fill="#fff"/>
</svg>
