<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0a1f6e"/>
      <stop offset="100%" stop-color="#1a4db5"/>
    </linearGradient>
    <linearGradient id="arrow" x1="32" y1="12" x2="58" y2="52" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#00e5ff"/>
      <stop offset="100%" stop-color="#00b8d9"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="64" height="64" rx="12" fill="url(#bg)"/>

  <!-- Left brain half (white) -->
  <path d="M32 10 C24 10 16 14 12 22 C8 30 9 40 13 48 C16 54 22 58 32 58 L32 10Z"
    fill="white" opacity="0.15" stroke="white" stroke-width="1.5"/>

  <!-- Right brain half (lighter) -->
  <path d="M32 10 C40 10 48 14 52 22 C56 30 55 40 51 48 C48 54 42 58 32 58 L32 10Z"
    fill="none" stroke="url(#arrow)" stroke-width="1.5"/>

  <!-- Circuit dots left side -->
  <circle cx="18" cy="26" r="2.5" fill="white" opacity="0.8"/>
  <line x1="18" y1="26" x2="26" y2="26" stroke="white" stroke-width="1.5" opacity="0.6"/>
  <circle cx="18" cy="36" r="2.5" fill="white" opacity="0.8"/>
  <line x1="18" y1="36" x2="26" y2="36" stroke="white" stroke-width="1.5" opacity="0.6"/>
  <line x1="26" y1="26" x2="26" y2="36" stroke="white" stroke-width="1.5" opacity="0.6"/>

  <!-- Upward arrow right side -->
  <line x1="40" y1="50" x2="54" y2="22" stroke="url(#arrow)" stroke-width="3.5" stroke-linecap="round"/>
  <polyline points="46,22 54,22 54,30" stroke="url(#arrow)" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Center divider -->
  <line x1="32" y1="12" x2="32" y2="56" stroke="white" stroke-width="1" opacity="0.25" stroke-dasharray="3 2"/>
</svg>
