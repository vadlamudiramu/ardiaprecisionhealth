<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 160" fill="none">
  <defs>
    <linearGradient id="lg1" x1="0" y1="0" x2="160" y2="160" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0d7c6e"/>
      <stop offset="60%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#14b8a6"/>
    </linearGradient>
    <linearGradient id="lg2" x1="0" y1="0" x2="160" y2="160" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1e2f4a"/>
      <stop offset="100%" stop-color="#0d3340"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="195" y1="0" x2="540" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1e2f4a"/>
      <stop offset="100%" stop-color="#0d3340"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- White background -->
  <rect width="560" height="160" fill="#ffffff"/>

  <!-- ===== ICON MARK ===== -->
  <!-- Outer quantum ring (orbit) -->
  <ellipse cx="80" cy="80" rx="68" ry="68" stroke="url(#lg1)" stroke-width="2" stroke-dasharray="6 3" opacity="0.35"/>

  <!-- Inner filled circle bg -->
  <circle cx="80" cy="80" r="54" fill="url(#lg2)" opacity="0.97"/>

  <!-- Quantum orbit rings - 3 planes -->
  <!-- Ring 1: horizontal -->
  <ellipse cx="80" cy="80" rx="42" ry="14" stroke="#14b8a6" stroke-width="1.5" fill="none" opacity="0.6"/>
  <!-- Ring 2: tilted 60° -->
  <ellipse cx="80" cy="80" rx="42" ry="14" stroke="#0ea5e9" stroke-width="1.5" fill="none" opacity="0.5"
    transform="rotate(60 80 80)"/>
  <!-- Ring 3: tilted 120° -->
  <ellipse cx="80" cy="80" rx="42" ry="14" stroke="#5eead4" stroke-width="1.5" fill="none" opacity="0.5"
    transform="rotate(120 80 80)"/>

  <!-- Neural nodes at orbit intersections -->
  <circle cx="122" cy="80" r="4" fill="#14b8a6" filter="url(#glow)"/>
  <circle cx="38"  cy="80" r="4" fill="#14b8a6" filter="url(#glow)"/>
  <circle cx="80"  cy="122" r="4" fill="#0ea5e9" filter="url(#glow)"/>
  <circle cx="80"  cy="38"  r="4" fill="#0ea5e9" filter="url(#glow)"/>
  <circle cx="101" cy="56"  r="3" fill="#f59e0b" filter="url(#glow)"/>
  <circle cx="59"  cy="104" r="3" fill="#f59e0b" filter="url(#glow)"/>
  <circle cx="59"  cy="56"  r="3" fill="#5eead4" filter="url(#glow)"/>
  <circle cx="101" cy="104" r="3" fill="#5eead4" filter="url(#glow)"/>

  <!-- DNA-like cross helix center -->
  <!-- Vertical helix strand -->
  <path d="M80 46 Q86 55 80 64 Q74 73 80 82 Q86 91 80 100 Q74 109 80 118"
        stroke="#5eead4" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.9"/>
  <!-- Horizontal helix strand -->
  <path d="M46 80 Q55 74 64 80 Q73 86 82 80 Q91 74 100 80 Q109 86 118 80"
        stroke="#14b8a6" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.9"/>
  <!-- Cross-links -->
  <line x1="67" y1="59" x2="73" y2="66" stroke="#f59e0b" stroke-width="1.5" opacity="0.7"/>
  <line x1="87" y1="68" x2="93" y2="61" stroke="#f59e0b" stroke-width="1.5" opacity="0.7"/>
  <line x1="67" y1="94" x2="73" y2="101" stroke="#f59e0b" stroke-width="1.5" opacity="0.7"/>
  <line x1="87" y1="101" x2="93" y2="94" stroke="#f59e0b" stroke-width="1.5" opacity="0.7"/>

  <!-- Center nucleus glow -->
  <circle cx="80" cy="80" r="7" fill="#fff" opacity="0.15"/>
  <circle cx="80" cy="80" r="4" fill="#14b8a6" opacity="0.9"/>
  <circle cx="80" cy="80" r="2" fill="#fff"/>

  <!-- Small accent: upward arrow (top-right of icon) -->
  <path d="M106 46 L114 36 L122 46" stroke="#f59e0b" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="114" y1="36" x2="114" y2="54" stroke="#f59e0b" stroke-width="2.5" stroke-linecap="round"/>

  <!-- ===== WORDMARK ===== -->
  <!-- ARDIA -->
  <text x="172" y="86"
    font-family="'Sora', 'Arial Black', sans-serif"
    font-size="52"
    font-weight="800"
    letter-spacing="2"
    fill="url(#textGrad)">ARDIA</text>

  <!-- HEALTH subtitle -->
  <text x="174" y="112"
    font-family="'DM Sans', Arial, sans-serif"
    font-size="16"
    font-weight="700"
    letter-spacing="7"
    fill="#0d7c6e">HEALTH</text>

  <!-- Tagline -->
  <text x="175" y="132"
    font-family="'DM Sans', Arial, sans-serif"
    font-size="10"
    font-weight="500"
    letter-spacing="2.5"
    fill="#7a93b0">PRECISION REVENUE INTELLIGENCE</text>

  <!-- Vertical separator line -->
  <line x1="163" y1="56" x2="163" y2="138" stroke="#dce8f2" stroke-width="1.5"/>
</svg>
