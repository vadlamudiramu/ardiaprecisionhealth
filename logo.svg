<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 420" fill="none">
  <defs>
    <linearGradient id="mainGrad" x1="60" y1="60" x2="460" y2="360" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#1a237e"/>
      <stop offset="35%"  stop-color="#1565c0"/>
      <stop offset="70%"  stop-color="#0288d1"/>
      <stop offset="100%" stop-color="#00b4d8"/>
    </linearGradient>
    <linearGradient id="arrowGrad" x1="260" y1="320" x2="440" y2="100" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#0288d1"/>
      <stop offset="100%" stop-color="#00e5ff"/>
    </linearGradient>
    <linearGradient id="leftGrad" x1="60" y1="60" x2="260" y2="360" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#1a237e"/>
      <stop offset="100%" stop-color="#283593"/>
    </linearGradient>
  </defs>

  <!-- White background -->
  <rect width="520" height="420" fill="#ffffff"/>

  <!-- ===== LEFT BRAIN HALF (with convolutions) ===== -->
  <path d="
    M260,72
    C240,70 218,74 200,84
    C185,92 172,104 165,115
    C152,98  132,92  118,100
    C104,108  98,124  102,138
    C88,138  76,146  72,160
    C66,176  72,194  84,202
    C74,212  68,228  74,244
    C80,260  96,268  110,264
    C108,278  110,294  118,306
    C128,320  144,326  158,322
    C162,336  172,348  186,354
    C202,360  220,356  232,346
    C240,356  252,364  260,364
    L260,72 Z
  " stroke="url(#leftGrad)" stroke-width="5" stroke-linejoin="round" stroke-linecap="round" fill="none"/>

  <!-- ===== RIGHT BRAIN HALF (with convolutions) ===== -->
  <path d="
    M260,72
    C280,70 302,74 320,84
    C335,92 348,104 355,115
    C368,98  388,92  402,100
    C416,108  422,124  418,138
    C432,138  444,146  448,160
    C454,176  448,194  436,202
    C446,212  452,228  446,244
    C440,260  424,268  410,264
    C412,278  410,294  402,306
    C392,320  376,326  362,322
    C358,336  348,348  334,354
    C318,360  300,356  288,346
    C280,356  268,364  260,364
    L260,72 Z
  " stroke="url(#arrowGrad)" stroke-width="5" stroke-linejoin="round" stroke-linecap="round" fill="none"/>

  <!-- Center vertical dotted divider -->
  <line x1="260" y1="72" x2="260" y2="364" stroke="url(#mainGrad)" stroke-width="2" stroke-dasharray="8,5" opacity="0.5"/>

  <!-- ===== PCB CIRCUIT TRACES — LEFT SIDE ===== -->
  <!-- Trace 1: upper-left, going NW -->
  <line x1="165" y1="115" x2="130" y2="115" stroke="url(#leftGrad)" stroke-width="2.5"/>
  <line x1="130" y1="115" x2="130" y2="85"  stroke="url(#leftGrad)" stroke-width="2.5"/>
  <circle cx="130" cy="85" r="5" fill="none" stroke="#1a237e" stroke-width="2.5"/>
  <circle cx="130" cy="85" r="2" fill="#283593"/>
  <!-- Branch off trace 1 -->
  <line x1="130" y1="100" x2="100" y2="100" stroke="url(#leftGrad)" stroke-width="2.5"/>
  <circle cx="100" cy="100" r="5" fill="none" stroke="#1a237e" stroke-width="2.5"/>
  <circle cx="100" cy="100" r="2" fill="#283593"/>

  <!-- Trace 2: mid-left, going W -->
  <line x1="84"  y1="202" x2="54"  y2="202" stroke="url(#leftGrad)" stroke-width="2.5"/>
  <line x1="54"  y1="202" x2="54"  y2="175" stroke="url(#leftGrad)" stroke-width="2.5"/>
  <circle cx="54" cy="175" r="5" fill="none" stroke="#1565c0" stroke-width="2.5"/>
  <circle cx="54" cy="175" r="2" fill="#1565c0"/>
  <!-- Branch -->
  <line x1="54"  y1="202" x2="54"  y2="228" stroke="url(#leftGrad)" stroke-width="2.5"/>
  <circle cx="54" cy="228" r="5" fill="none" stroke="#1565c0" stroke-width="2.5"/>
  <circle cx="54" cy="228" r="2" fill="#1565c0"/>

  <!-- Trace 3: lower-left, going SW -->
  <line x1="110" y1="264" x2="76"  y2="264" stroke="url(#leftGrad)" stroke-width="2.5"/>
  <line x1="76"  y1="264" x2="76"  y2="295" stroke="url(#leftGrad)" stroke-width="2.5"/>
  <circle cx="76" cy="295" r="5" fill="none" stroke="#1565c0" stroke-width="2.5"/>
  <circle cx="76" cy="295" r="2" fill="#1565c0"/>
  <!-- Small branch -->
  <line x1="76"  y1="280" x2="52"  y2="280" stroke="url(#leftGrad)" stroke-width="2.5"/>
  <circle cx="52" cy="280" r="5" fill="none" stroke="#1565c0" stroke-width="2.5"/>
  <circle cx="52" cy="280" r="2" fill="#1565c0"/>

  <!-- Trace 4: bottom-left going S -->
  <line x1="158" y1="322" x2="120" y2="322" stroke="url(#leftGrad)" stroke-width="2.5"/>
  <line x1="120" y1="322" x2="120" y2="350" stroke="url(#leftGrad)" stroke-width="2.5"/>
  <circle cx="120" cy="350" r="5" fill="none" stroke="#283593" stroke-width="2.5"/>
  <circle cx="120" cy="350" r="2" fill="#283593"/>

  <!-- Small dots on left brain outline to suggest circuit nodes -->
  <circle cx="102" cy="138" r="3.5" fill="#1a237e"/>
  <circle cx="74"  cy="244" r="3.5" fill="#1565c0"/>

  <!-- ===== UPWARD ARROW — RIGHT SIDE ===== -->
  <!-- Main diagonal shaft -->
  <line x1="295" y1="330" x2="420" y2="130"
        stroke="url(#arrowGrad)" stroke-width="14"
        stroke-linecap="round"/>
  <!-- Arrowhead (two lines forming a V) -->
  <line x1="370" y1="118" x2="425" y2="125"
        stroke="url(#arrowGrad)" stroke-width="14"
        stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="432" y1="178" x2="425" y2="125"
        stroke="url(#arrowGrad)" stroke-width="14"
        stroke-linecap="round" stroke-linejoin="round"/>
</svg>
