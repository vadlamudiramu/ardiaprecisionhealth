<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <!-- Background gradient: deep navy -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="100" y2="100" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#1e3a5f"/>
      <stop offset="100%" stop-color="#0a1f35"/>
    </linearGradient>
    <!-- Teal accent gradient for bar -->
    <linearGradient id="tealGrad" x1="18" y1="0" x2="82" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#0d7c6e"/>
      <stop offset="100%" stop-color="#14b8a6"/>
    </linearGradient>
    <!-- Inner glow filter -->
    <filter id="ambGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- ── BACKGROUND: rounded square ── -->
  <rect width="100" height="100" rx="22" fill="url(#bgGrad)"/>
  <!-- Subtle inner border highlight -->
  <rect x="2" y="2" width="96" height="96" rx="20" fill="none"
        stroke="#2a5080" stroke-width="1" opacity="0.6"/>

  <!-- ── LETTER A: geometric polygon construction ── -->
  <!-- Left diagonal leg -->
  <polygon points="10,90 50,10 63,16 24,90" fill="white"/>
  <!-- Right diagonal leg -->
  <polygon points="50,10 90,90 76,90 37,16" fill="white"/>
  <!-- Horizontal crossbar -->
  <rect x="27" y="57" width="46" height="12" rx="2" fill="white"/>
  <!-- Restore inner hollow (overlap zone above crossbar) -->
  <polygon points="37,16 63,16 50,41" fill="url(#bgGrad)"/>
  <!-- Notch at the very apex so amber dot pops cleanly -->
  <polygon points="44,17 56,17 50,28" fill="url(#bgGrad)"/>

  <!-- ── AMBER APEX DOT ── -->
  <!-- Soft outer glow ring -->
  <circle cx="50" cy="10" r="8" fill="#d97706" opacity="0.20" filter="url(#ambGlow)"/>
  <!-- Main amber dot -->
  <circle cx="50" cy="10" r="5.5" fill="#d97706"/>
  <!-- Bright highlight inside amber dot -->
  <circle cx="48.5" cy="8.5" r="1.8" fill="white" opacity="0.45"/>

  <!-- ── TEAL ACCENT BAR (bottom) ── -->
  <rect x="18" y="91" width="64" height="5.5" rx="2.8" fill="url(#tealGrad)"/>
  <!-- Subtle shine on teal bar -->
  <rect x="18" y="91" width="64" height="2.5" rx="2.8" fill="white" opacity="0.12"/>
</svg>
